services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: drp
      POSTGRES_PASSWORD: drp
      POSTGRES_DB: drp
    ports:
      # Host 5433 to avoid clashing with a local Postgres already on 5432.
      - "5433:5432"
    volumes:
      - drp_pgdata:/var/lib/postgresql/data

volumes:
  drp_pgdata:
