name: Deploy API

# CD for the backend: on push to main, build the API image and push it to ECR.
# App Runner has auto-deploy enabled on the :latest tag, so the push triggers a
# rolling deploy of the live service automatically.
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# Serialise deploys: never cancel a production deploy mid-flight (an interrupted
# ECR push / App Runner rollout is risky). A newer push queues as pending and runs
# once the current deploy settles, so prod always converges to the latest commit.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bethere-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      # build-push-action wires up the GitHub Actions cache backend (it exposes the
      # runtime token automatically), so unchanged layers - notably the pnpm install -
      # are restored across deploys instead of rebuilt from scratch. mode=max caches
      # intermediate stages too for a higher hit rate. provenance=false keeps a single
      # plain image (App Runner does not want a multi-arch manifest list).
      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # App Runner auto-deploys on the :latest push. This step does NOT gate the deploy; it
      # waits for that auto-deploy to settle and raises a loud warning if it did not succeed
      # (e.g. a boot/migration crash makes App Runner roll back to the OLD image, leaving prod
      # stale even though this build is green). Turns a silent rollback into a visible signal.
      - name: Alert if App Runner rolled back
        env:
          SERVICE_ARN: arn:aws:apprunner:us-east-1:208569836255:service/bethere-api/260292b3564d41d6b60e9e2129a0263b
        run: |
          echo "Waiting for the App Runner auto-deploy to settle (not gating)..."
          sleep 30
          STATUS=""; TYPE=""
          # list-operations Status is one of PENDING | IN_PROGRESS | ROLLBACK_IN_PROGRESS |
          # SUCCEEDED | FAILED | ROLLBACK_SUCCEEDED | ROLLBACK_FAILED. Keep polling while the
          # newest operation is in a non-terminal state (note: this differs from describe-service's
          # OPERATION_IN_PROGRESS). App Runner deploys take a few minutes.
          for i in $(seq 1 40); do
            read TYPE STATUS < <(aws apprunner list-operations --service-arn "$SERVICE_ARN" \
              --max-results 1 --query 'OperationSummaryList[0].[Type,Status]' --output text)
            echo "operation=$TYPE status=$STATUS"
            case "$STATUS" in
              PENDING|IN_PROGRESS|ROLLBACK_IN_PROGRESS|"") sleep 15 ;;
              *) break ;;
            esac
          done
          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "App Runner deploy succeeded - prod is on the new image."
          else
            echo "::warning title=App Runner deploy did not succeed::Latest operation '$TYPE' ended with status='$STATUS'. App Runner likely ROLLED BACK to the previous image, so PROD MAY BE STALE despite this green build. Check the App Runner application logs for a boot/migration error (a baseline reset needs DB_RESET_ON_BOOT - see docs/runbook-deploy.md)."
          fi
