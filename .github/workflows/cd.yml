name: Android CD

# CD runs on push to main (production). main is protected and can only receive
# CI-passed dev -> main merges, so CI gates CD: nothing deploys without CI
# having passed on the dev -> main PR.
#
# Path-scoped: an API-only release does not change the APK (the API URL baked in
# is static), so we skip the slow Android build unless something the app actually
# ships changed. workflow_dispatch lets us cut an APK manually at any time.
on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "tsconfig.base.json"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

# Only the latest push to a branch needs an APK; cancel superseded builds in
# flight. The APK build has no external side effects, so cancelling is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      # Bake the live backend URL into the APK (EXPO_PUBLIC_* is inlined at build time).
      EXPO_PUBLIC_API_URL: https://96mgvmgcbj.us-east-1.awsapprunner.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Caches the Gradle User Home (downloaded deps + wrapper distribution) keyed
      # on the build. The Android project is generated by `expo prebuild` below, so
      # there is no wrapper to read at setup time; setup-gradle still captures and
      # restores ~/.gradle around the assembleRelease invocation. Writes happen on
      # the default branch (main), which is exactly what this workflow runs on.
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Generate native Android project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --no-install

      # Release build so the JS bundle (Hermes bytecode) is embedded in the APK and it
      # runs standalone. The Expo template signs release with the debug keystore, so the
      # APK is installable without extra credentials. (assembleDebug produces an APK that
      # expects a Metro dev server, which fails when sideloaded.)
      - name: Build release APK
        working-directory: apps/mobile
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
