name: Android CD

# CD runs on push to main (production). main is protected and can only receive
# CI-passed dev -> main merges, so CI gates CD: nothing deploys without CI
# having passed on the dev -> main PR.
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      # Bake the live backend URL into the APK (EXPO_PUBLIC_* is inlined at build time).
      EXPO_PUBLIC_API_URL: https://96mgvmgcbj.us-east-1.awsapprunner.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate native Android project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: apps/mobile
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug -PbundleInDebug=true

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
