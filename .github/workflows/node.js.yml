name: CI

# CI runs only on PRs into main. A lightweight guard rejects any PR whose
# source branch is not `dev`, so only dev -> main can ever merge. The heavy
# build/test (ci job) only proceeds for dev -> main.
on:
  pull_request:
    branches: ["main"]

# A new push to the PR supersedes any in-flight CI run for the same PR; cancel the
# stale one so we do not burn runners checking out-of-date commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Only dev may target main
        if: github.head_ref != 'dev'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "::error::Only the 'dev' branch can be merged into main (this PR's head is '${HEAD_REF}')."
          exit 1

  ci:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
